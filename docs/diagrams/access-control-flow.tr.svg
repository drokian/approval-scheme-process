<?xml version="1.0" encoding="UTF-8"?>
<svg width="920" height="820" viewBox="0 0 920 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Erişim kontrol akışı</title>
  <desc id="desc">Approval Scheme Process içindeki bağlam içi ve bağlam dışı erişimi karşılaştıran etkileşimli diyagram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F6F2"/>
      <stop offset="100%" stop-color="#FAFAF9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#D9D5CB" flood-opacity="0.45"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8B877B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .title { font-size: 16px; font-weight: 700; fill: #2C2C2A; }
    .subtitle { font-size: 12px; fill: #666257; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 12px; }
    .tiny { font-size: 11px; }
    .card { cursor: pointer; }
    .card .surface {
      transition: stroke-width 0.2s ease, filter 0.2s ease;
    }
    .card:hover .surface {
      stroke-width: 1.4;
      filter: url(#shadow);
    }
    .card:hover .headline {
      text-decoration: underline;
    }
    .arrow {
      fill: none;
      stroke: #B8B3A7;
      stroke-width: 1.5;
      marker-end: url(#arr);
    }
  </style>

  <rect width="920" height="820" fill="url(#bg)"/>
  <rect x="28" y="24" width="864" height="772" rx="24" fill="#FCFCFB" stroke="#E5E1D7"/>

  <text x="64" y="68" class="title">Erişim kontrol akışı</text>
  <text x="64" y="92" class="subtitle">Erişim Motoru aynı kontrol sırasını izler, ancak bağlama göre farklı sonuca gider</text>

  <line x1="460" y1="118" x2="460" y2="748" stroke="#D9D5CB" stroke-dasharray="7 6"/>

  <rect x="64" y="120" width="358" height="54" rx="16" fill="#1D9E75" stroke="#0F6E56"/>
  <text x="88" y="152" class="label" fill="#FFFFFF">Bağlam içi yol</text>
  <text x="88" y="168" class="tiny" fill="#EAF8F3">Oturum, atama ve hedef eşleştiğinde kullanılır.</text>

  <rect x="498" y="120" width="358" height="54" rx="16" fill="#993C1D" stroke="#712B13"/>
  <text x="522" y="152" class="label" fill="#FFFFFF">Bağlam dışı yol</text>
  <text x="522" y="168" class="tiny" fill="#FCEFEA">Oturum bağlamı eksik ya da uyumsuz olduğunda kullanılır.</text>

  <a href="../flows.tr.md">
    <g class="card">
      <title>Randevu temelli oturum akışı.</title>
      <rect class="surface" x="64" y="202" width="358" height="96" rx="18" fill="#E6F4EF" stroke="#1D9E75"/>
      <text x="88" y="232" class="headline label" fill="#085041">1. Randevu aktif oturuma dönüşür</text>
      <text x="88" y="254" class="small" fill="#0F6E56">Personel bu oturuma atanır ve oturum farkındalıklı</text>
      <text x="88" y="274" class="small" fill="#0F6E56">arayüzü kullanır.</text>
    </g>
  </a>

  <line x1="243" y1="298" x2="243" y2="322" class="arrow"/>

  <a href="../architecture.tr.md">
    <g class="card">
      <title>Erişim Motoru içinde bağlam ve rol doğrulaması.</title>
      <rect class="surface" x="64" y="322" width="358" height="96" rx="18" fill="#FAEEDA" stroke="#BA7517"/>
      <text x="88" y="352" class="headline label" fill="#633806">2. Erişim Motoru bağlamı doğrular</text>
      <text x="88" y="374" class="small" fill="#854F0B">Aktif oturumu, atanan personeli, hedef eşleşmesini</text>
      <text x="88" y="394" class="small" fill="#854F0B">ve rol yetkisini kontrol eder.</text>
    </g>
  </a>

  <line x1="243" y1="418" x2="243" y2="442" class="arrow"/>

  <a href="../security-levels.tr.md">
    <g class="card">
      <title>Seviye 0, talebin geçerli bağlam içinde kaldığını ve onay gerektirmediğini gösterir.</title>
      <rect class="surface" x="64" y="442" width="358" height="96" rx="18" fill="#E6F4EF" stroke="#1D9E75"/>
      <text x="88" y="472" class="headline label" fill="#085041">3. Talep Seviye 0'da kalır</text>
      <text x="88" y="494" class="small" fill="#0F6E56">Talep geçerli oturum bağlamı içinde kaldığı için</text>
      <text x="88" y="514" class="small" fill="#0F6E56">ek onay gerekmez.</text>
    </g>
  </a>

  <line x1="243" y1="538" x2="243" y2="562" class="arrow"/>

  <a href="../flows.tr.md">
    <g class="card">
      <title>İzin verilen bağlam içi sonuç ve zorunlu kayıt.</title>
      <rect class="surface" x="64" y="562" width="358" height="104" rx="18" fill="#FFFFFF" stroke="#D9D5CB"/>
      <rect x="88" y="582" width="146" height="36" rx="14" fill="#1D9E75" stroke="#0F6E56"/>
      <text x="161" y="605" text-anchor="middle" class="headline label" fill="#FFFFFF">İzin verildi</text>
      <text x="88" y="635" class="small" fill="#666257">Sorgu sonucu ve talep ayrıntıları denetlenebilirlik</text>
      <text x="88" y="655" class="small" fill="#666257">için kayda alınır.</text>
    </g>
  </a>

  <a href="../flows.tr.md">
    <g class="card">
      <title>Geçerli oturum olmadığında veya hedef eşleşmediğinde bağlam dışı tespit başlar.</title>
      <rect class="surface" x="498" y="202" width="358" height="96" rx="18" fill="#FDEFE8" stroke="#993C1D"/>
      <text x="522" y="232" class="headline label" fill="#712B13">1. Talep geçerli oturum bağlamı dışındadır</text>
      <text x="522" y="254" class="small" fill="#993C1D">Geçerli oturum yoktur ya da sorgu hedefi oturum</text>
      <text x="522" y="274" class="small" fill="#993C1D">kapsamıyla eşleşmez.</text>
    </g>
  </a>

  <line x1="677" y1="298" x2="677" y2="322" class="arrow"/>

  <a href="../architecture.tr.md">
    <g class="card">
      <title>Erişim Motoru rolü, işlem türünü ve temel uygunluğu kontrol eder.</title>
      <rect class="surface" x="498" y="322" width="358" height="96" rx="18" fill="#FAEEDA" stroke="#BA7517"/>
      <text x="522" y="352" class="headline label" fill="#633806">2. Erişim Motoru talebi sınıflandırır</text>
      <text x="522" y="374" class="small" fill="#854F0B">Motor rol uygunluğunu doğrular, işlem türünü belirler</text>
      <text x="522" y="394" class="small" fill="#854F0B">ve güvenlik seviyesini çözer.</text>
    </g>
  </a>

  <line x1="677" y1="418" x2="677" y2="442" class="arrow"/>

  <a href="../security-levels.tr.md">
    <g class="card">
      <title>Seviye 1 ile 4 arasındaki talepler kademeli olarak daha güçlü kontroller gerektirir.</title>
      <rect class="surface" x="498" y="442" width="358" height="96" rx="18" fill="#FDEFE8" stroke="#993C1D"/>
      <text x="522" y="472" class="headline label" fill="#712B13">3. Seviye 1 ile 4 kontrollü erişimi başlatır</text>
      <text x="522" y="494" class="small" fill="#993C1D">Çözülen seviye kaç onay gerektiğini ve hangi kontrol</text>
      <text x="522" y="514" class="small" fill="#993C1D">rollerinin devreye gireceğini belirler.</text>
    </g>
  </a>

  <line x1="677" y1="538" x2="677" y2="562" class="arrow"/>

  <a href="../flows.tr.md">
    <g class="card">
      <title>Onay Motoru iş akışını yürütür ve izin ver ya da reddet sonucunu döndürür.</title>
      <rect class="surface" x="498" y="562" width="358" height="104" rx="18" fill="#FFFFFF" stroke="#D9D5CB"/>
      <rect x="522" y="582" width="126" height="36" rx="14" fill="#1D9E75" stroke="#0F6E56"/>
      <text x="585" y="605" text-anchor="middle" class="headline label" fill="#FFFFFF">İzin verildi</text>
      <rect x="664" y="582" width="126" height="36" rx="14" fill="#A32D2D" stroke="#791F1F"/>
      <text x="727" y="605" text-anchor="middle" class="headline label" fill="#FFFFFF">Reddedildi</text>
      <text x="522" y="635" class="small" fill="#666257">Talep, onay geçmişi ve nihai sonuç birlikte</text>
      <text x="522" y="655" class="small" fill="#666257">kayıt altına alınır.</text>
    </g>
  </a>

  <rect x="64" y="692" width="792" height="50" rx="14" fill="#FFFFFF" stroke="#D9D5CB"/>
  <text x="460" y="714" text-anchor="middle" class="small" fill="#666257">Kartların üzerine gelerek vurguyu görebilir, tıklayarak</text>
  <text x="460" y="734" text-anchor="middle" class="small" fill="#666257">ilgili Türkçe dokümana geçebilirsiniz.</text>
</svg>
