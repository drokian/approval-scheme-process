<?xml version="1.0" encoding="UTF-8"?>
<svg width="920" height="896" viewBox="0 0 920 896" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Approval workflow</title>
  <desc id="desc">Interactive diagram of the approval workflow used for out-of-context requests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F6F2"/>
      <stop offset="100%" stop-color="#FAFAF9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#D9D5CB" flood-opacity="0.45"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8B877B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .title { font-size: 16px; font-weight: 700; fill: #2C2C2A; }
    .subtitle { font-size: 12px; fill: #666257; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 12px; }
    .tiny { font-size: 11px; }
    .card { cursor: pointer; }
    .card .surface {
      transition: stroke-width 0.2s ease, filter 0.2s ease;
    }
    .card:hover .surface {
      stroke-width: 1.4;
      filter: url(#shadow);
    }
    .card:hover .headline {
      text-decoration: underline;
    }
    .arrow {
      fill: none;
      stroke: #B8B3A7;
      stroke-width: 1.5;
      marker-end: url(#arr);
    }
    .loop {
      fill: none;
      stroke: #B8B3A7;
      stroke-width: 1.3;
      stroke-dasharray: 6 5;
      marker-end: url(#arr);
    }
  </style>

  <rect width="920" height="896" fill="url(#bg)"/>
  <rect x="28" y="24" width="864" height="848" rx="24" fill="#FCFCFB" stroke="#E5E1D7"/>

  <text x="64" y="68" class="title">Approval workflow</text>
  <text x="64" y="92" class="subtitle">Applies only after the Access Engine classifies a request as approval-required</text>

  <a href="../flows.md">
    <g class="card">
      <title>Approval request creation from the Access Engine.</title>
      <rect class="surface" x="276" y="118" width="368" height="78" rx="18" fill="#F3F0E8" stroke="#8B877B"/>
      <text x="306" y="146" class="headline label" fill="#2C2C2A">1. Request created</text>
      <text x="306" y="168" class="small" fill="#666257">The Access Engine sends context, operation type,</text>
      <text x="306" y="184" class="small" fill="#666257">security level, and justification.</text>
    </g>
  </a>

  <line x1="460" y1="196" x2="460" y2="228" class="arrow"/>

  <a href="../flows.md">
    <g class="card">
      <title>Approval scheme lookup by operation type.</title>
      <rect class="surface" x="276" y="228" width="368" height="78" rx="18" fill="#EAF3FF" stroke="#185FA5"/>
      <text x="306" y="256" class="headline label" fill="#0C447C">2. Scheme loaded</text>
      <text x="306" y="278" class="small" fill="#185FA5">The Approval Engine resolves the configured</text>
      <text x="306" y="294" class="small" fill="#185FA5">approval chain for that operation type.</text>
    </g>
  </a>

  <line x1="460" y1="306" x2="460" y2="338" class="arrow"/>

  <a href="../flows.md">
    <g class="card">
      <title>Ordered approval steps are generated.</title>
      <rect class="surface" x="276" y="338" width="368" height="78" rx="18" fill="#EAF3FF" stroke="#185FA5"/>
      <text x="306" y="366" class="headline label" fill="#0C447C">3. Ordered steps generated</text>
      <text x="306" y="388" class="small" fill="#185FA5">Roles, order, and expiry rules are prepared</text>
      <text x="306" y="404" class="small" fill="#185FA5">before the first review starts.</text>
    </g>
  </a>

  <line x1="460" y1="416" x2="460" y2="446" class="arrow"/>

  <rect x="218" y="446" width="486" height="238" rx="22" fill="#FFFDFC" stroke="#D9D5CB" stroke-dasharray="7 6"/>
  <text x="242" y="470" class="tiny" fill="#8B877B">Repeat this section for each approval step</text>

  <a href="../flows.md">
    <g class="card">
      <title>The current step is routed to the responsible approver role.</title>
      <rect class="surface" x="276" y="486" width="368" height="72" rx="18" fill="#FDEFE8" stroke="#993C1D"/>
      <text x="306" y="514" class="headline label" fill="#712B13">4. Step routed to approver</text>
      <text x="306" y="536" class="small" fill="#993C1D">The designated role is notified and</text>
      <text x="306" y="552" class="small" fill="#993C1D">the response window starts.</text>
    </g>
  </a>

  <line x1="460" y1="558" x2="460" y2="592" class="arrow"/>

  <a href="../flows.md">
    <g class="card">
      <title>The approver reviews request details, risk, and justification.</title>
      <rect class="surface" x="276" y="592" width="368" height="72" rx="18" fill="#FDEFE8" stroke="#993C1D"/>
      <text x="306" y="620" class="headline label" fill="#712B13">5. Approver reviews</text>
      <text x="306" y="642" class="small" fill="#993C1D">Checks query details, employee justification,</text>
      <text x="306" y="658" class="small" fill="#993C1D">context, and policy implications.</text>
    </g>
  </a>

  <path d="M644 628 L734 628 L734 514 L646 514" class="loop"/>
  <text x="742" y="560" class="tiny" fill="#8B877B">More steps</text>
  <text x="742" y="575" class="tiny" fill="#8B877B">if required</text>

  <path d="M460 664 L460 700 L346 700 L346 726" class="arrow"/>
  <path d="M460 664 L460 700 L574 700 L574 726" class="arrow"/>

  <text x="314" y="718" class="tiny" fill="#A32D2D">Rejected or expired</text>
  <text x="604" y="718" class="tiny" fill="#1D9E75">All required steps approved</text>

  <a href="../flows.md">
    <g class="card">
      <title>Denied outcome for rejected or expired workflows.</title>
      <rect class="surface" x="256" y="726" width="180" height="46" rx="18" fill="#A32D2D" stroke="#791F1F"/>
      <text x="346" y="755" text-anchor="middle" class="headline label" fill="#FFFFFF">Denied</text>
    </g>
  </a>

  <a href="../flows.md">
    <g class="card">
      <title>Allowed outcome after the required approvals are completed.</title>
      <rect class="surface" x="484" y="726" width="180" height="46" rx="18" fill="#1D9E75" stroke="#0F6E56"/>
      <text x="574" y="755" text-anchor="middle" class="headline label" fill="#FFFFFF">Allowed</text>
    </g>
  </a>

  <rect x="64" y="714" width="182" height="54" rx="14" fill="#FFFFFF" stroke="#D9D5CB"/>
  <text x="84" y="738" class="tiny" fill="#666257">Every approval decision</text>
  <text x="84" y="756" class="tiny" fill="#666257">is recorded with time and actor.</text>

  <path d="M346 772 L346 806 L398 806 L398 820" class="arrow"/>
  <path d="M574 772 L574 806 L522 806 L522 820" class="arrow"/>
  <rect x="310" y="820" width="300" height="28" rx="10" fill="#F3F0E8" stroke="#D9D5CB"/>
  <text x="460" y="838" text-anchor="middle" class="tiny" fill="#666257">Final outcome logged with full approval history</text>
</svg>
