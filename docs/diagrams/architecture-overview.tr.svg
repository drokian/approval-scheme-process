<?xml version="1.0" encoding="UTF-8"?>
<svg width="976" height="800" viewBox="0 0 976 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mimari genel görünüm</title>
  <desc id="desc">Approval Scheme Process mimarisinin çekirdek hattını ve destek servislerini gösteren etkileşimli diyagram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F6F2"/>
      <stop offset="100%" stop-color="#FAFAF9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#D9D5CB" flood-opacity="0.45"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8B877B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .muted { fill: #666257; }
    .small { font-size: 12px; }
    .label { font-size: 13px; font-weight: 600; }
    .title { font-size: 16px; font-weight: 700; fill: #2C2C2A; }
    .subtitle { font-size: 12px; fill: #666257; }
    .card {
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .card .surface {
      transition: stroke-width 0.2s ease, filter 0.2s ease, fill 0.2s ease;
    }
    .card:hover .surface {
      stroke-width: 1.4;
      filter: url(#shadow);
    }
    .card:hover .headline {
      text-decoration: underline;
    }
    .arrow {
      fill: none;
      stroke: #B8B3A7;
      stroke-width: 1.5;
      marker-end: url(#arr);
    }
    .dashed {
      stroke-dasharray: 6 5;
    }
  </style>

  <rect width="976" height="800" fill="url(#bg)"/>
  <rect x="28" y="24" width="920" height="752" rx="24" fill="#FCFCFB" stroke="#E5E1D7"/>

  <text x="64" y="68" class="title">Approval Scheme Process</text>
  <text x="64" y="92" class="subtitle">Bağlantılı kontrol alanları ve destek servisleriyle mimari genel görünüm</text>

  <rect x="64" y="114" width="260" height="70" rx="16" fill="#F3F0E8" stroke="#D8D3C7"/>
  <text x="84" y="134" class="label" fill="#2C2C2A">Giriş noktası</text>
  <text x="84" y="154" class="small muted">Personel randevu temelli ya da bağlam dışı</text>
  <text x="84" y="170" class="small muted">bir erişim talebi başlatır.</text>

  <line x1="474" y1="170" x2="474" y2="206" class="arrow"/>
  <line x1="474" y1="284" x2="474" y2="320" class="arrow"/>
  <line x1="474" y1="398" x2="474" y2="434" class="arrow"/>
  <line x1="474" y1="512" x2="474" y2="548" class="arrow"/>
  <line x1="474" y1="626" x2="474" y2="662" class="arrow"/>

  <line x1="628" y1="255" x2="730" y2="255" class="arrow dashed"/>
  <line x1="628" y1="370" x2="730" y2="370" class="arrow dashed"/>
  <line x1="320" y1="473" x2="272" y2="473" class="arrow dashed"/>

  <a href="../architecture.tr.md">
    <g class="card">
      <title>Randevu Sistemi: randevu bağlamını ve işlem türünü yönetir.</title>
      <rect class="surface" x="320" y="206" width="308" height="78" rx="18" fill="#EAF3FF" stroke="#185FA5"/>
      <text x="346" y="236" class="headline label" fill="#0C447C">Randevu Sistemi</text>
      <text x="346" y="256" class="small" fill="#185FA5">İşlem türünü, vatandaş bağlamını</text>
      <text x="346" y="272" class="small" fill="#185FA5">ve iş gerekçesini taşır.</text>
    </g>
  </a>

  <a href="../architecture.tr.md">
    <g class="card">
      <title>Oturum Motoru: randevuyu aktif oturuma dönüştürür ve personel atar.</title>
      <rect class="surface" x="320" y="320" width="308" height="78" rx="18" fill="#EAF3FF" stroke="#185FA5"/>
      <text x="346" y="350" class="headline label" fill="#0C447C">Oturum Motoru</text>
      <text x="346" y="370" class="small" fill="#185FA5">Aktif oturum oluşturur, yaşam döngüsünü izler</text>
      <text x="346" y="386" class="small" fill="#185FA5">ve personel bağlamını bağlar.</text>
    </g>
  </a>

  <a href="../architecture.tr.md">
    <g class="card">
      <title>Erişim Motoru: bağlamı, rolü, işlem türünü ve güvenlik seviyesini doğrular.</title>
      <rect class="surface" x="320" y="434" width="308" height="78" rx="18" fill="#FAEEDA" stroke="#BA7517"/>
      <text x="346" y="464" class="headline label" fill="#633806">Erişim Motoru</text>
      <text x="346" y="484" class="small" fill="#854F0B">Bağlamı, rolü, işlem türünü</text>
      <text x="346" y="500" class="small" fill="#854F0B">ve onay gerekip gerekmediğini kontrol eder.</text>
    </g>
  </a>

  <a href="../architecture.tr.md">
    <g class="card">
      <title>Onay Motoru: yalnızca Erişim Motoru gerektiğinde onay adımlarını yürütür.</title>
      <rect class="surface" x="320" y="548" width="308" height="78" rx="18" fill="#FAECE7" stroke="#993C1D"/>
      <text x="346" y="578" class="headline label" fill="#712B13">Onay Motoru</text>
      <text x="346" y="598" class="small" fill="#993C1D">Yalnızca onay gerektiğinde çalışır</text>
      <text x="346" y="614" class="small" fill="#993C1D">ve izin ver ya da reddet sonucu döndürür.</text>
    </g>
  </a>

  <a href="../architecture.tr.md">
    <g class="card">
      <title>Kayıt ve Denetim Katmanı: talep, onay ve sonuç kayıtlarını saklar.</title>
      <rect class="surface" x="320" y="662" width="308" height="64" rx="18" fill="#F3F0E8" stroke="#8B877B"/>
      <text x="346" y="688" class="headline label" fill="#2C2C2A">Kayıt ve Denetim Katmanı</text>
      <text x="346" y="706" class="small" fill="#666257">İzlenebilirlik, loglama ve denetim desteği</text>
    </g>
  </a>

  <a href="../security-levels.tr.md">
    <g class="card">
      <title>Güvenlik Seviyesi Yöneticisi: işlem türlerini 0 ile 4 arasındaki seviyelere eşler.</title>
      <rect class="surface" x="730" y="214" width="190" height="82" rx="18" fill="#E6F4EF" stroke="#1D9E75"/>
      <text x="754" y="245" class="headline label" fill="#085041">Güvenlik Seviyesi Yöneticisi</text>
      <text x="754" y="264" class="small" fill="#0F6E56">Her işlem türü için temel riski</text>
      <text x="754" y="280" class="small" fill="#0F6E56">ve seviye eşlemesini çözer.</text>
    </g>
  </a>

  <a href="../flows.tr.md">
    <g class="card">
      <title>Onay Şeması Yöneticisi: rol bazlı onay zincirlerini ve sıralarını tanımlar.</title>
      <rect class="surface" x="730" y="329" width="190" height="82" rx="18" fill="#FDEFE8" stroke="#993C1D"/>
      <text x="754" y="360" class="headline label" fill="#712B13">Onay Şeması Yöneticisi</text>
      <text x="754" y="379" class="small" fill="#993C1D">Sıralı adımları, rolleri</text>
      <text x="754" y="395" class="small" fill="#993C1D">ve koşullu dalları sağlar.</text>
    </g>
  </a>

  <a href="../compliance.tr.md">
    <g class="card">
      <title>Uyum ve yönetişim: politika, denetlenebilirlik ve hukuki kontroller.</title>
      <rect class="surface" x="72" y="418" width="200" height="112" rx="18" fill="#F6F3EC" stroke="#8B877B"/>
      <text x="96" y="448" class="headline label" fill="#2C2C2A">Yönetişim ve Uyum</text>
      <text x="96" y="470" class="small muted">Denetim politikası, saklama</text>
      <text x="96" y="486" class="small muted">ve gözden geçirme süreçleri ile</text>
      <text x="96" y="502" class="small muted">kamu kurumu kontrol</text>
      <text x="96" y="518" class="small muted">beklentileri.</text>
    </g>
  </a>

  <rect x="596" y="86" width="260" height="90" rx="16" fill="#FFFFFF" stroke="#E5E1D7"/>
  <text x="620" y="110" class="label" fill="#2C2C2A">Okuma rehberi</text>
  <text x="620" y="131" class="small muted">Düz çizgiler ana talep akışını gösterir.</text>
  <text x="620" y="147" class="small muted">Kesikli çizgiler politika ve yapılandırma</text>
  <text x="620" y="163" class="small muted">bağımlılıklarını gösterir.</text>
</svg>
